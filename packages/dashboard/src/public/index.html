<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperCode Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo">⚡ SuperCode</span>
      <span class="version">v0.1.0</span>
    </div>
    <div class="topbar-center">
      <div class="control-group" style="flex-direction:column;align-items:flex-start;gap:3px">
        <label>Model</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input id="model-search" type="text" placeholder="Search models..." style="width:200px;font-size:12px" />
          <select id="model-select" style="max-width:260px;font-size:12px">
            <option value="openrouter/deepseek/deepseek-r1">Loading models…</option>
          </select>
        </div>
      </div>
      <div class="control-group">
        <label>Mode</label>
        <select id="mode-select">
          <option value="default">default</option>
          <option value="acceptEdits">acceptEdits</option>
          <option value="plan">plan</option>
          <option value="dontAsk">dontAsk</option>
        </select>
      </div>
      <div class="control-group">
        <label>Dir</label>
        <input id="dir-input" type="text" value="." placeholder="Working directory" />
      </div>
      <button id="init-btn" class="btn btn-primary">Connect</button>
    </div>
    <div class="topbar-right">
      <div id="cost-display" class="cost-badge">Tokens: 0 | Cost: $0.0000</div>
      <div id="status-dot" class="status-dot disconnected" title="Disconnected"></div>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="layout">

    <!-- LEFT SIDEBAR: Sessions -->
    <aside class="sidebar">
      <div class="sidebar-header">Sessions</div>
      <div id="session-list" class="session-list">
        <div class="session-empty">No sessions yet</div>
      </div>
      <button id="new-session-btn" class="btn btn-ghost sidebar-btn">+ New Session</button>
    </aside>

    <!-- CHAT AREA -->
    <main class="chat-area">
      <div id="messages" class="messages">
        <div class="welcome-msg">
          <div class="welcome-icon">⚡</div>
          <div class="welcome-title">SuperCode Dashboard</div>
          <div class="welcome-sub">Configure your model and working directory, then click Connect to start a session.</div>
          <div id="provider-status" class="provider-chips"></div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="chat-input"
            placeholder="Ask SuperCode to build, fix, or explain anything…"
            rows="1"
            disabled
          ></textarea>
          <button id="send-btn" class="btn btn-send" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
        <div class="input-hints">
          <span>Enter to send</span>
          <span>Shift+Enter for newline</span>
          <button id="clear-btn" class="btn-link">Clear history</button>
        </div>
      </div>
    </main>

    <!-- RIGHT SIDEBAR: Tool Log -->
    <aside class="tool-log">
      <div class="sidebar-header">Tool Log</div>
      <div id="tool-entries" class="tool-entries">
        <div class="tool-empty">Tool calls will appear here</div>
      </div>
    </aside>
  </div>

  <!-- APPROVAL MODAL -->
  <div id="approval-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-title">⚠ Tool Approval Required</div>
      <div id="approval-desc" class="modal-desc"></div>
      <div class="modal-actions">
        <button id="deny-btn" class="btn btn-danger">Deny</button>
        <button id="approve-btn" class="btn btn-primary">Allow</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
